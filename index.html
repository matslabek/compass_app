<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compass</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #ffffff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      user-select: none;
    }

    .wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
    }

    /* ── ALERT CARD ── */
    .alert-card {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #FFF6EE;
      border-radius: 16px;
      padding: 12px 16px;
      width: 100%;
    }
    .alert-cat {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      flex-shrink: 0;
    }
    .alert-title {
      font-weight: 600;
      font-size: 1rem;
      color: #E8840C;
    }
    .alert-desc {
      font-size: 0.85rem;
      color: #888;
      margin-top: 2px;
    }

    /* ── COMPASS ── */
    .compass-wrap {
      position: relative;
      width: min(300px, 80vw);
      height: min(300px, 80vw);
    }

    .ring-static, .rose, .needle-layer {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }
    .needle-layer { pointer-events: none; }

    /* ── DISTANCE ── */
    .distance-value {
      font-size: 2.6rem;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      line-height: 1;
    }
    .distance-label {
      font-size: 0.9rem;
      color: #888;
      text-align: center;
      margin-top: 6px;
    }

    /* ── ACTION BUTTON ── */
    .action-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      background: white;
      font-family: inherit;
      font-size: 0.95rem;
      color: #444;
      cursor: pointer;
      width: 100%;
      justify-content: center;
    }
    .action-btn:active { background: #f5f5f5; }

    @keyframes pulse-opacity {
      0%, 100% { opacity: 0.7; }
      50%       { opacity: 1; }
    }
    .acquiring .compass-wrap { animation: pulse-opacity 1.8s ease-in-out infinite; }
  </style>
</head>
<body>
<div class="wrapper" id="app">

  <!-- Proximity alert card — hidden until within 5 m -->
  <div class="alert-card" id="alertCard" style="display:none">
    <img class="alert-cat" src="design/img.png" alt="">
    <div>
      <div class="alert-title">Hej!</div>
      <div class="alert-desc">Zajrzyj na drzewo!</div>
    </div>
  </div>

  <!-- Compass -->
  <div class="compass-wrap" id="compassWrap">

    <!-- Static layer: peach ring background + white inner + cardinal labels -->
    <svg class="ring-static" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
      <circle cx="160" cy="160" r="155" fill="#F5C9A0"/>
      <circle cx="160" cy="160" r="126" fill="#ffffff"/>
      <text x="160" y="22"  text-anchor="middle" fill="#E53E3E" font-family="-apple-system,sans-serif" font-size="13" font-weight="700">N</text>
      <text x="160" y="309" text-anchor="middle" fill="#aaa"     font-family="-apple-system,sans-serif" font-size="13">S</text>
      <text x="304" y="165" text-anchor="middle" fill="#aaa"     font-family="-apple-system,sans-serif" font-size="13">E</text>
      <text x="16"  y="165" text-anchor="middle" fill="#aaa"     font-family="-apple-system,sans-serif" font-size="13">W</text>
    </svg>

    <!-- Rotating rose: tick marks + degree labels + centre details -->
    <svg class="rose" id="rose" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
      <g id="ticks"></g>
      <!-- Faint cross lines -->
      <line x1="160" y1="34"  x2="160" y2="286" stroke="#ececec" stroke-width="1"/>
      <line x1="34"  y1="160" x2="286" y2="160" stroke="#ececec" stroke-width="1"/>
      <!-- Centre glow -->
      <circle cx="160" cy="160" r="20" fill="#F5C9A0" opacity="0.5"/>
      <circle cx="160" cy="160" r="5"  fill="#E8840C"/>
    </svg>

    <!-- Needle layer: fixed, points toward target -->
    <svg class="needle-layer" viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
      <!-- Needle line -->
      <line x1="160" y1="160" x2="160" y2="56" stroke="#1a1a1a" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Cat circle at tip -->
      <defs>
        <clipPath id="catClip">
          <circle cx="160" cy="34" r="24"/>
        </clipPath>
      </defs>
      <circle cx="160" cy="34" r="27" fill="#F5C9A0"/>
      <circle cx="160" cy="34" r="24" fill="white"/>
      <image href="design/img.png" x="136" y="10" width="48" height="48"
             clip-path="url(#catClip)" preserveAspectRatio="xMidYMid slice"/>
    </svg>

  </div>

  <!-- Distance display -->
  <div>
    <div class="distance-value" id="stat-dist">—</div>
    <div class="distance-label">dzieli Cię od celu</div>
  </div>

  <!-- Action button (iOS orientation permission, hidden on Android) -->
  <button class="action-btn" id="actionBtn" style="display:none">✛ Reaguj na ruch</button>

</div>

<script>
  // ═══════════════════════════════════════════════════
  //  ★  CONFIGURE YOUR TARGET HERE  ★
  // ═══════════════════════════════════════════════════
  const TARGET = {
    lat:  50.064534,
    lng:  20.035051,
    name: "???"
  };
  // ═══════════════════════════════════════════════════

  // Draw tick marks and degree labels on the rotating rose
  const ticksG = document.getElementById('ticks');
  for (let deg = 0; deg < 360; deg += 10) {
    const rad = (deg - 90) * Math.PI / 180;
    const isMajor = deg % 30 === 0;
    const rOuter = 152;
    const rInner = isMajor ? 133 : 141;
    const x1 = 160 + rOuter * Math.cos(rad), y1 = 160 + rOuter * Math.sin(rad);
    const x2 = 160 + rInner * Math.cos(rad), y2 = 160 + rInner * Math.sin(rad);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', x1); line.setAttribute('y1', y1);
    line.setAttribute('x2', x2); line.setAttribute('y2', y2);
    line.setAttribute('stroke', isMajor ? '#c0a080' : '#d8c0a0');
    line.setAttribute('stroke-width', isMajor ? '1.5' : '1');
    ticksG.appendChild(line);

    if (isMajor) {
      const rLabel = 120;
      const tx = 160 + rLabel * Math.cos(rad);
      const ty = 160 + rLabel * Math.sin(rad);
      const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      text.setAttribute('x', tx);
      text.setAttribute('y', ty);
      text.setAttribute('text-anchor', 'middle');
      text.setAttribute('dominant-baseline', 'central');
      text.setAttribute('fill', '#bbb');
      text.setAttribute('font-family', '-apple-system,sans-serif');
      text.setAttribute('font-size', '9');
      text.textContent = deg + '°';
      ticksG.appendChild(text);
    }
  }

  // ── Haversine distance (km) ──
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat/2)**2 +
              Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ── Initial bearing from user to target ──
  function bearing(lat1, lon1, lat2, lon2) {
    const φ1 = lat1 * Math.PI / 180, φ2 = lat2 * Math.PI / 180;
    const Δλ = (lon2 - lon1) * Math.PI / 180;
    const y = Math.sin(Δλ) * Math.cos(φ2);
    const x = Math.cos(φ1)*Math.sin(φ2) - Math.sin(φ1)*Math.cos(φ2)*Math.cos(Δλ);
    return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
  }

  function fmtDist(km) {
    return km >= 10  ? `${Math.round(km)} km`
         : km >= 1   ? `${km.toFixed(1)} km`
                     : `${Math.round(km*1000)} m`;
  }

  const distEl    = document.getElementById('stat-dist');
  const app       = document.getElementById('app');
  const compassWrap = document.getElementById('compassWrap');

  let userLat = null, userLon = null;
  let deviceHeading = 0;
  let targetBearing = 0;
  let proximityAlerted = false;

  function updateRose() {
    const rotation = targetBearing - deviceHeading;
    compassWrap.style.transform = `rotate(${rotation}deg)`;
    compassWrap.style.transition = 'transform 0.15s ease-out';
  }

  // ── Geolocation ──
  if (!navigator.geolocation) {
    // geolocation unavailable — nothing to show
  } else {
    app.classList.add('acquiring');
    navigator.geolocation.watchPosition(
      pos => {
        userLat = pos.coords.latitude;
        userLon = pos.coords.longitude;
        app.classList.remove('acquiring');

        const dist = haversine(userLat, userLon, TARGET.lat, TARGET.lng);
        targetBearing = bearing(userLat, userLon, TARGET.lat, TARGET.lng);

        distEl.textContent = fmtDist(dist);

        if (!proximityAlerted && dist * 1000 <= 1000) {
          proximityAlerted = true;
          document.getElementById('alertCard').style.display = 'flex';
        }

        updateRose();
      },
      () => {},
      { enableHighAccuracy: true, maximumAge: 5000 }
    );
  }

  // ── Device orientation ──
  function handleOrientation(e) {
    if (e.webkitCompassHeading !== undefined) {
      deviceHeading = e.webkitCompassHeading;
    } else if (e.alpha !== null) {
      deviceHeading = (360 - e.alpha) % 360;
    }
    updateRose();
  }

  if (typeof DeviceOrientationEvent !== 'undefined') {
    if (typeof DeviceOrientationEvent.requestPermission === 'function') {
      // iOS 13+ — show the action button
      const btn = document.getElementById('actionBtn');
      btn.style.display = '';
      btn.onclick = () => {
        DeviceOrientationEvent.requestPermission().then(state => {
          if (state === 'granted') {
            window.addEventListener('deviceorientation', handleOrientation, true);
            btn.style.display = 'none';
          }
        }).catch(console.error);
      };
    } else {
      window.addEventListener('deviceorientation', handleOrientation, true);
    }
  }
</script>
</body>
</html>
